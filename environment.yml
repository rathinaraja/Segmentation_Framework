name: seg_framework
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.10

  # ── PyTorch (with CUDA 12.1) ─────────────────────────────────────────────
  # Change cudatoolkit version to match your GPU driver if needed
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=12.1

  # ── Scientific stack ─────────────────────────────────────────────────────
  - numpy>=1.23.0
  - pillow>=9.0.0

  # ── Configuration ────────────────────────────────────────────────────────
  - pyyaml>=6.0

  # ── pip-only packages ────────────────────────────────────────────────────
  - pip
  - pip:
    - timm>=0.9.0        # DropPath, trunc_normal_, to_2tuple — used by SegFormer / SwinUNet
